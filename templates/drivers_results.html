<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial;
            background-color: #dddada;
        }

        .driver-container {
            width: 90%;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .driver-card {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            overflow: hidden;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .driver-card:hover {
            transform: scale(1.02);
        }

        .driver-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .driver-info {
            padding: 15px;
        }

        .driver-info table {
            width: 100%;
            border-collapse: collapse;
        }

        .driver-info td {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .call-btn {
            background: green;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }

        .call-btn:hover {
            background: darkgreen;
        }
    </style>
</head>
<body>

<h2 style="text-align: center;">Available Drivers</h2>

<div class="driver-container">
    {% for driver in drivers %}
    <div class="driver-card">
        <!-- Use Cloudinary URL directly from database -->
        {% if driver.image1 %}
            <img class="driver-image" src="{{ driver.image1 }}" alt="Driver image">
        {% else %}
            <img class="driver-image" src="{{ url_for('static', filename='default-driver.jpg') }}" alt="No image">
        {% endif %}

        <div class="driver-info">
            <table>
                <tr>
                    <td><b>Name</b></td>
                    <td>{{ driver.name }}</td>
                </tr>
                <tr>
                    <td><b>Truck</b></td>
                    <td>{{ driver.truck_name }}</td>
                </tr>
                <tr>
                    <td><b>District</b></td>
                    <td>{{ driver.district }}</td>
                </tr>
                <tr>
                    <td><b>Town</b></td>
                    <td>{{ driver.town }}</td>
                </tr>
                <tr>
                    <td><b>Phone</b></td>
                    <td>
                        <a href="tel:{{ driver.phone }}" class="call-btn">Call</a>
                    </td>
                </tr>
            </table>
        </div>
    </div>
    {% endfor %}
</div>

</body>
</html>
